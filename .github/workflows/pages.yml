name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject public API URL into configure UI
        env:
          # Set PUBLIC_API_URL in repo Settings → Variables after deploying Render
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
        run: |
          API="${PUBLIC_API_URL:-https://stremio-channel-organizer.onrender.com}"
          API="${API%/}"
          echo "Using API base: $API"
          sed -i "s|__CHANNEL_ORGANIZER_API__|${API}|g" web/configure.html
          sed -i "s|__CHANNEL_ORGANIZER_API__|${API}|g" web/static/configure.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
