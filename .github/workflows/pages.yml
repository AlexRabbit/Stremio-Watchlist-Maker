name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API URL and configure token into UI
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          CONFIGURE_API_TOKEN: ${{ secrets.CONFIGURE_API_TOKEN }}
        run: |
          API="${PUBLIC_API_URL:-}"
          if [ -z "$API" ]; then
            echo "::error::Add repository secret PUBLIC_API_URL (Settings → Secrets → Actions)"
            exit 1
          fi
          API="${API%/}"
          TOKEN="${CONFIGURE_API_TOKEN:-}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Add repository secret CONFIGURE_API_TOKEN (same value as API_TOKEN on VPS)"
            exit 1
          fi
          echo "Using API base: $API"
          sed -i "s|__CHANNEL_ORGANIZER_API__|${API}|g" web/configure.html
          sed -i "s|__CHANNEL_ORGANIZER_API__|${API}|g" web/static/configure.js
          sed -i "s|__CONFIGURE_API_TOKEN__|${TOKEN}|g" web/static/configure.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
